<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="jquery-4.0.0.min.js"></script>
    <script src="apiCaller.js"></script>
    <title>Home</title>
</head>
<body>
    <div class="appBody">
    <main>
        <header>
            <div class="user">Ved Bhagat</div>
            <div class="header-tag">
                <select id="navigator" class="navigator dropdown" on name="" id="">
                    <option id="dashboard" value="" data-loc="sections/dashboard.html" selected>Dashboard</option>
                    <option id="classroom" value="" data-loc="sections/classroom.html">Classrooms</option>
                    <option id="course" value="" data-loc="sections/course.html">Courses</option>
                    <option id="department" value="" data-loc="sections/department.html">Departments</option>
                    <option id="division" value="" data-loc="sections/division.html">Divisions</option>
                    <option id="programme" value="" data-loc="sections/programme.html">Programmes</option>
                    <option id="teacher" value="" data-loc="sections/teacher.html">Teachers</option>
                    <option id="teacherWorkload" value="" data-loc="sections/teacherWorkload.html">Teacher Workload</option>
                    <option id="timeslot" value="" data-loc="sections/timeslot.html">Timeslot</option>
                    <option id="timetable" value="" data-loc="sections/timetable.html">Timetable</option>
                </select>
            </div>
            <div class="header-menu">
                <select class="dropdown" name="" id="">
                    <option value="">2025-23</option>
                </select>
                <select class="dropdown" name="" id="">
                    <option value="">ODD sem</option>
                </select>
                <button class="btn primary critical">logout</button>
            </div>
        </header>
        <div id="MainContents"></div>
    </main>
    </div>
</body>
<script src="https://kit.fontawesome.com/1042c9c102.js" crossorigin="anonymous"></script>
<script>
       
    $(document).ready(function(){
        $("#MainContents").load('sections/dashboard.html');
        $(".navigator").change(
            function () {
                var currentlyViewing = $(".navigator>option:selected").attr("data-loc");
                $("#MainContents").load(currentlyViewing);
            }
        );
    });
    async function load_existing(tablename){
        const formData = new FormData();
        formData.append('formType', 'load_existing');
        formData.append('tablename', tablename);
        const result = await $.ajax({
            url: 'api.php',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false
        });
        return result;
    }
    
    async function confirmDeleteDialog(heading, description, recordId, callback) {
        const popup = $(`
            <div class="tempPopup dull-bg">
                <div class="dialog dialog-question">
                    <p class="dialog-heading">${heading}</p>
                    <p class="dialog-description">${description}</p>
                    <div class="dialog-button-group">
                        <button class="btn secondary cancel-btn">Cancel</button>
                        <button class="btn primary confirm-btn">Confirm</button>
                    </div>
                </div>
            </div>
        `);
        $('body').append(popup);
        popup.find('.cancel-btn').click(() => {
            popup.remove();
        });
        popup.find('.confirm-btn').click(async () => {
            popup.remove();
            await callback(recordId);
        });
    }
    
    function getView(form){
        if(form.css('display')=='none') return false
        return true
    }
    function turnOn(){
        $('.addnew-block').css('display','block');
        document.getElementsByClassName('addnew-block')[0].scrollIntoView({ 
            behavior: 'smooth', 
            block: 'start' // Options: 'start', 'center', 'end', or 'nearest'
        });
    }
    function turnOff(){$('.addnew-block').css('display','none');}
    function toggleView(){
        var form = $('.addnew-block');
        if(getView(form)){
            form.css('display','none');
        }else{
            form.css('display','block');
        }  
    }

    function showInfoInline(infoBody){
        const info = $(`<p id="formInfoLine" class="none" ><span>${infoBody}</span></p>`);
        $('body').append(info);
        setTimeout(()=>{info.remove();},3000);
    }   


    
</script>
</html>
